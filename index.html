<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Prompt Logger</title>
	<style>
		:root {
			--bg: #f7f3ea;
			--panel: #fffdf8;
			--ink: #1f1b17;
			--muted: #5f5a55;
			--accent: #c35a2e;
			--accent-2: #285943;
			--border: #dfd6c8;
		}

		* {
			box-sizing: border-box;
		}

		body {
			width: 380px;
			margin: 0;
			font-family: "Segoe UI", Tahoma, sans-serif;
			color: var(--ink);
			background: radial-gradient(circle at 100% 0, #f2dec5, transparent 40%), var(--bg);
			padding: 14px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 18px;
			letter-spacing: 0.2px;
		}

		p {
			margin: 0 0 12px;
			color: var(--muted);
			font-size: 12px;
			line-height: 1.4;
		}

		.actions {
			display: flex;
			gap: 8px;
			margin-bottom: 12px;
		}

		button {
			border: 1px solid var(--border);
			background: var(--panel);
			border-radius: 8px;
			padding: 8px 10px;
			font-size: 12px;
			cursor: pointer;
			color: var(--ink);
		}

		button.primary {
			background: var(--accent);
			color: #fff;
			border-color: var(--accent);
		}

		button.warn {
			background: var(--accent-2);
			color: #fff;
			border-color: var(--accent-2);
		}

		#count {
			margin-bottom: 8px;
			font-size: 12px;
			color: var(--muted);
		}

		#list {
			display: flex;
			flex-direction: column;
			gap: 8px;
			max-height: 340px;
			overflow: auto;
			padding-right: 2px;
		}

		.item {
			border: 1px solid var(--border);
			border-radius: 10px;
			background: var(--panel);
			padding: 9px;
		}

		.time {
			font-size: 11px;
			color: var(--muted);
			margin-bottom: 6px;
		}

		.text {
			font-size: 12px;
			white-space: pre-wrap;
			line-height: 1.4;
		}

		.empty {
			padding: 12px;
			border: 1px dashed var(--border);
			border-radius: 10px;
			color: var(--muted);
			font-size: 12px;
			background: var(--panel);
		}
	</style>
</head>
<body>
	<h1>ChatGPT Prompt Logger</h1>
	<p>This extension stores prompts locally in your browser. Nothing is sent to external servers.</p>

	<div class="actions">
		<button id="refreshBtn">Refresh</button>
		<button id="exportBtn" class="primary">Export JSON</button>
		<button id="clearBtn" class="warn">Clear</button>
	</div>

	<div id="count"></div>
	<div id="list"></div>

	<script src="popup.js"></script>
</body>
</html>
