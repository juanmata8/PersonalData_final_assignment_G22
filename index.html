<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Coding Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-shell">
  <main class="popup-layout">
    <section class="hero-card compact">
      <p class="eyebrow">Browser Extension</p>
      <h1>LLM Coding Explorer</h1>
      <p id="status" class="lead">Loading local workspace data...</p>
      <div id="count" class="stat-inline"></div>
      <div id="sources" class="badge-row"></div>
    </section>

    <section class="panel compact">
      <div class="button-stack">
        <button id="openSetup" class="primary">Open Setup</button>
        <button id="openTime">Time Patterns</button>
        <button id="openCategories">Categories</button>
        <button id="openSummary">Summary</button>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
